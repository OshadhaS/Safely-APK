<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Safely App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #4CAF50;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .blink-text {
            font-size: 14px;
            color: #ffb300;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: bold;
            animation: blinker 1.2s linear infinite;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }

        p {
            color: #aaaaaa;
            margin-bottom: 25px;
        }

        .pin-section {
            margin-bottom: 20px;
        }

        .pin-input {
            background-color: #2a2a2a;
            border: 2px solid #444444;
            color: white;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            width: 60%;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .pin-input:focus {
            border-color: #4CAF50;
        }

        .verify-btn {
            background-color: #333333;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
            transition: background 0.3s;
        }

        .verify-btn:hover {
            background-color: #444444;
        }

        /* ⏳ මැද කොටස් සුමටව අයින් කරන්න හදපු CSS */
        .fade-out-content {
            max-height: 200px;
            opacity: 1;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
            overflow: hidden;
        }

        .fade-out-content.hide {
            max-height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
        }

        /* 🚀 Download Button Animation (Fade-in & Slide-up) */
        .btn {
            display: none;
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            margin: 20px auto;
        }

        .btn.show {
            display: inline-block;
            animation: slideUpFadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideUpFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px); /* යට ඉඳන් උඩට එන්න */
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn:hover {
            background-color: #45a049;
        }

        .error-msg {
            display: none;
            color: #f44336;
            font-size: 14px;
            margin-top: 10px;
        }

        .device-warning {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="container">
        <h1>Safely App</h1>
        
        <div id="middleContent" class="fade-out-content">
            <div id="textInstructions">
                <p>Enter the PIN number provided to you to download the app.</p>
                <h6 class="blink-text">It's right where you got this link.</h6>
            </div>

            <div class="pin-section" id="pinArea">
                <input type="password" id="pinInput" class="pin-input" placeholder="Enter PIN Code" maxlength="6" autofocus
                    onkeydown="checkEnter(event)">
                <button onclick="checkPin()" class="verify-btn">Verify</button>
                <div id="errorMsg" class="error-msg">❌ Incorrect PIN! Try again.</div>
            </div>
        </div>

        <a href="https://drive.google.com/file/d/1nQEaYXDg7HebPxD4khFsCRxNm6g6YlIo/view?usp=drive_link" class="btn" id="downloadBtn" target="_blank">Download APK</a>

        <div id="warningMessage" class="device-warning">
            ⚠️ <span id="detectedDevice">You are using a non-Android device.</span> Please use an Android device to
            download and install the app.
        </div>
    </div>

    <script>
        var ENCRYPTED_PIN = "MjAyNg==";

        function checkPin() {
            var input = document.getElementById("pinInput").value.trim();
            var error = document.getElementById("errorMsg");
            var downloadBtn = document.getElementById("downloadBtn");
            var middleContent = document.getElementById("middleContent");

            if (btoa(input) === ENCRYPTED_PIN) {
                error.style.display = "none";
                
                // ✨ මැද කෑලි ටික ලස්සනට කුඩාවෙලා නැතිවෙන්න 'hide' class එක දානවා
                middleContent.classList.add("hide");
                
                // 🚀 බටන් එක ඇනිමේෂන් එකත් එක්ක පාවෙලා එන්න 'show' class එක දානවා
                downloadBtn.classList.add("show");
            } else {
                error.style.display = "block";
                document.getElementById("pinInput").focus();
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter" || event.keyCode === 13) {
                checkPin();
            }
        }

        // Keyboard shortcuts block 
        document.onkeydown = function (e) {
            if (e.keyCode == 123) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
            if (e.metaKey && e.altKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        };

        // Device detect
        document.addEventListener("DOMContentLoaded", function () {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var isAndroid = /android/i.test(userAgent);

            if (!isAndroid) {
                var deviceName = "a non-Android device";
                if (/iPhone|iPad|iPod/i.test(userAgent)) {
                    deviceName = "an iPhone / iPad";
                } else if (/Macintosh|MacIntel|MacPPC|Mac68K/i.test(userAgent)) {
                    deviceName = "a Mac";
                } else if (/Windows NT/i.test(userAgent)) {
                    deviceName = "a Windows PC";
                }
                document.getElementById("detectedDevice").innerText = "You are using " + deviceName + ".";
                document.getElementById("warningMessage").style.display = "block";
            }
            document.getElementById("pinInput").focus();
        });
    </script>

</body>

</html>
